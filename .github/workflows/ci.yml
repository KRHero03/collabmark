name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/app backend/tests

      - name: Ruff format check
        run: ruff format --check backend/app backend/tests

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: corepack enable && yarn install --frozen-lockfile
        working-directory: frontend

      - name: Frontend lint (tsc + eslint + prettier)
        run: yarn run check
        working-directory: frontend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxml2-dev libxmlsec1-dev libxmlsec1-openssl

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend tests
        run: python -m pytest
        working-directory: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: corepack enable && yarn install --frozen-lockfile
        working-directory: frontend

      - name: Run frontend tests
        run: yarn test
        working-directory: frontend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: corepack enable && yarn install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: yarn build
        working-directory: frontend

  deploy:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  rollback:
    needs: [test-backend, test-frontend, build]
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Revert failed commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert --no-edit HEAD
          git push origin main
