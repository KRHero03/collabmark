services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-collabmark}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-collabmark-secret}
    command: server /data --console-address ":9001"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
      - minio
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-collabmark}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-collabmark-secret}
      - S3_BUCKET=${S3_BUCKET:-collabmark-media}
      - DEBUG=false
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
